<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Уточняющие, пояснительные и присоединительные конструкции</title>
  <style>
    :root{
      --bg1:#071120;
      --bg2:#0b1d38;
      --panel:rgba(12,18,32,.94);
      --card:rgba(255,255,255,.06);
      --stroke:rgba(255,255,255,.13);
      --text:#eef6ff;
      --muted:#a8bdd8;
      --blue:#2388ff;
      --green:#18c76b;
      --yellow:#f4bf38;
      --red:#ff5a6d;
      --gray1:#a8b9dd;
      --gray2:#7386b0;
      --shadow:0 10px 35px rgba(0,0,0,.35);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      height:100%;
      font-family: Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 650px at 18% 0%, #16325c 0%, transparent 50%),
        radial-gradient(1000px 700px at 100% 25%, #11294d 0%, transparent 45%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      overflow:hidden;
    }

    .app{
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      background:var(--panel);
      border-bottom:1px solid var(--stroke);
      box-shadow:var(--shadow);
      padding:10px 14px;
    }

    .topbar-inner{
      max-width:1450px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .top-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .mode-btn,
    .action-btn{
      border:none;
      border-radius:14px;
      padding:11px 16px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      color:#fff;
      transition:.15s ease;
      box-shadow:0 0 0 1px rgba(255,255,255,.15) inset, 0 8px 20px rgba(0,0,0,.24);
      line-height:1.15;
      white-space:nowrap;
    }

    .mode-btn:hover,
    .action-btn:hover{
      transform:translateY(-1px);
    }

    .mode-btn.blue{ background:linear-gradient(180deg, #56a8ff, var(--blue)); }
    .mode-btn.green{ background:linear-gradient(180deg, #42e38f, var(--green)); }
    .mode-btn.yellow{ background:linear-gradient(180deg, #ffd66b, var(--yellow)); color:#10203d; }
    .action-btn.gray{ background:linear-gradient(180deg, var(--gray1), var(--gray2)); }

    .mode-btn.active{
      box-shadow:
        0 0 0 2px rgba(255,255,255,.75) inset,
        0 0 16px rgba(255,255,255,.18),
        0 10px 24px rgba(0,0,0,.3);
    }

    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .stats-box{
      background:rgba(255,255,255,.08);
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:8px 12px;
      min-width:104px;
      text-align:center;
    }

    .stats-box .small{
      display:block;
      font-size:11px;
      color:var(--muted);
      margin-bottom:2px;
      text-transform:uppercase;
      letter-spacing:.3px;
      font-weight:600;
    }

    .stats-box .big{
      font-size:20px;
      font-weight:800;
      line-height:1.1;
    }

    .top-message{
      display:none;
      width:100%;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,214,107,.45);
      border-radius:14px;
      padding:10px 14px;
      font-size:17px;
      font-weight:800;
      color:#fff1c9;
      text-align:center;
      line-height:1.25;
    }

    .top-message.show{ display:block; }

    .top-message.ok{
      border-color:rgba(66,227,143,.5);
      color:#ddffe9;
    }

    .main{
      flex:1;
      min-height:0;
      padding:14px;
    }

    .scroll{
      max-width:1450px;
      margin:0 auto;
      height:100%;
      overflow-y:auto;
      padding-right:6px;
    }

    .scroll::-webkit-scrollbar{ width:10px; }
    .scroll::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.16);
      border-radius:10px;
    }

    .hint{
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      margin:0 0 12px;
      padding:0 4px;
    }

    .sentence{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:20px;
      padding:18px 20px;
      margin:0 0 16px;
      line-height:2;
      font-size:29px;
      text-align:left;
      box-shadow:var(--shadow);
    }

    .word{
      display:inline-block;
      padding:3px 7px;
      margin:0 1px;
      border-radius:10px;
      cursor:pointer;
      user-select:none;
      transition:.14s ease;
    }

    .word:hover{
      background:rgba(255,255,255,.08);
    }

    .word.done{
      cursor:default;
    }

    .word.correct-blue{
      background:rgba(35,136,255,.23);
      box-shadow:0 0 0 2px rgba(35,136,255,.95) inset, 0 0 12px rgba(35,136,255,.25);
    }

    .word.correct-green{
      background:rgba(24,199,107,.22);
      box-shadow:0 0 0 2px rgba(24,199,107,.95) inset, 0 0 12px rgba(24,199,107,.22);
    }

    .word.correct-yellow{
      background:rgba(244,191,56,.22);
      box-shadow:0 0 0 2px rgba(244,191,56,.95) inset, 0 0 12px rgba(244,191,56,.22);
      color:#fff6da;
    }

    .word.wrong{
      background:rgba(255,90,109,.18);
      box-shadow:0 0 0 2px rgba(255,90,109,.95) inset;
    }

    .final{
      display:none;
      margin:24px 0 10px;
      text-align:center;
      font-size:24px;
      font-weight:800;
      color:#ffe082;
    }

    @media (max-width: 1100px){
      .sentence{
        font-size:24px;
        line-height:1.9;
      }
    }

    @media (max-width: 760px){
      .topbar{ padding:10px; }
      .topbar-inner{ gap:8px; }
      .top-row{ gap:10px; }

      .buttons{
        width:100%;
        gap:8px;
      }

      .mode-btn,
      .action-btn{
        flex:1 1 calc(50% - 8px);
        min-width:0;
        font-size:14px;
        padding:10px 12px;
        border-radius:12px;
        white-space:normal;
      }

      .stats{
        width:100%;
        justify-content:flex-start;
      }

      .stats-box{
        flex:1 1 calc(50% - 8px);
        min-width:0;
        padding:8px 10px;
      }

      .stats-box .big{
        font-size:18px;
      }

      .top-message{
        font-size:15px;
        padding:10px 12px;
        border-radius:12px;
      }

      .main{
        padding:10px;
      }

      .sentence{
        font-size:19px;
        line-height:1.82;
        padding:14px 14px;
        border-radius:16px;
      }

      .word{
        padding:4px 6px;
        border-radius:8px;
        margin:1px;
      }

      .hint{
        font-size:13px;
      }

      .final{
        font-size:20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="top-row">
          <div class="buttons">
            <button id="utochBtn" class="mode-btn blue active">Уточнение</button>
            <button id="poyasnBtn" class="mode-btn green">Пояснение</button>
            <button id="prisBtn" class="mode-btn yellow">Присоединение</button>
            <button id="checkBtn" class="action-btn gray">Проверить</button>
            <button id="resetBtn" class="action-btn gray">Сброс</button>
            <button id="homeBtn" class="action-btn gray" onclick="location.href='index.html'">На главную</button>
          </div>

          <div class="stats">
            <div class="stats-box">
              <span class="small">Баллы</span>
              <span id="score" class="big">0</span>
            </div>
            <div class="stats-box">
              <span class="small">Ошибки</span>
              <span id="errors" class="big">0</span>
            </div>
          </div>
        </div>

        <div id="topMessage" class="top-message"></div>
      </div>
    </div>

    <div class="main">
      <div class="scroll">
        <div class="hint">
          Сначала выбери кнопку сверху. Потом отмечай слова по одному:
          <b>синим</b> — уточнение,
          <b>зелёным</b> — пояснение,
          <b>жёлтым</b> — присоединение.
          Когда закончишь, нажми <b>«Проверить»</b>.
        </div>

        <div id="quiz"></div>
        <div id="final" class="final"></div>
      </div>
    </div>
  </div>

  <script>
    const data = [
      `Там ||в глубине двора|| стоял старый флигель.`,
      `Мы встретились утром ||часов в шесть|| и сразу принялись обсуждать мероприятие.`,
      `Письмо пришло вечером ||около восьми часов|| и очень всех обрадовало.`,
      `На полке ||в самом углу|| лежали те самые книги.`,
      `Встреча была в апреле ||сразу после каникул||.`,
      `За деревней ||на сухих прогалинах|| до самой зари хороводилась молодёжь.`,
      `Внизу ||под глинистым обрывом|| поблёскивало Азовское море.`,

      `Кольчатый тюлень <<или нерпа>> относится к ластоногим.`,
      `На уроке мы повторяли отглагольные части речи <<то есть причастие и деепричастие>>.`,
      `Там много аллигаторов <<то есть крокодилов>> и плавать опасно.`,
      `В лесном овраге слышалось воркованье диких голубей <<или горлинок>>.`,
      `Кругом здания шёл каменный балкон <<или веранда>>.`,
      `По всей ширине Лены торчали льдины <<или по-местному торосья>>.`,
      `Земля окружена воздушной оболочкой <<или атмосферой>>.`,
      `Осьминоги <<или спруты>> — это морские моллюски.`,

      `Она ко всем предметам хорошо готовилась {{особенно к литературе}}.`,
      `Незаметно я привязался к доброму семейству {{даже к хмурому гарнизонному поручику}}.`,
      `Я нигде не видел такой красоты {{даже на Байкале}}.`,
      `Они все трое {{в особенности старый казак}} были краснее обыкновенного.`,
      `Иногда в общей массе железного лома попадались какие-нибудь редкостные вещицы {{например замок с фокусом и таинственным механизмом}}.`,
      `На субботник пришли все {{даже самые ленивые}}.`,
      `На это указывают многие авторы {{в частности И.М. Иванов К.Р. Петров и др.}}.`
    ];

    let mode = "utoch";
    let score = 0;
    let errors = 0;
    let totalTargets = 0;
    let foundTargets = 0;

    const utochBtn = document.getElementById("utochBtn");
    const poyasnBtn = document.getElementById("poyasnBtn");
    const prisBtn = document.getElementById("prisBtn");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const scoreEl = document.getElementById("score");
    const errorsEl = document.getElementById("errors");
    const quizEl = document.getElementById("quiz");
    const finalEl = document.getElementById("final");
    const topMessageEl = document.getElementById("topMessage");

    function shuffleArray(arr){
      return [...arr].sort(() => Math.random() - 0.5);
    }

    utochBtn.addEventListener("click", () => {
      mode = "utoch";
      utochBtn.classList.add("active");
      poyasnBtn.classList.remove("active");
      prisBtn.classList.remove("active");
    });

    poyasnBtn.addEventListener("click", () => {
      mode = "poyasn";
      poyasnBtn.classList.add("active");
      utochBtn.classList.remove("active");
      prisBtn.classList.remove("active");
    });

    prisBtn.addEventListener("click", () => {
      mode = "pris";
      prisBtn.classList.add("active");
      utochBtn.classList.remove("active");
      poyasnBtn.classList.remove("active");
    });

    checkBtn.addEventListener("click", () => {
      const missed = totalTargets - foundTargets;

      topMessageEl.classList.add("show");
      topMessageEl.classList.remove("ok");

      if (missed === 0) {
        topMessageEl.textContent = "Ничего не пропущено.";
        topMessageEl.classList.add("ok");
        finalEl.style.display = "block";
        finalEl.textContent = `Готово! Баллы: ${score} · Ошибки: ${errors}`;
      } else if (missed === 1) {
        topMessageEl.textContent = "Пропущено 1 слово.";
        finalEl.style.display = "none";
      } else if (missed >= 2 && missed <= 4) {
        topMessageEl.textContent = `Пропущено ${missed} слова.`;
        finalEl.style.display = "none";
      } else {
        topMessageEl.textContent = `Пропущено ${missed} слов.`;
        finalEl.style.display = "none";
      }
    });

    resetBtn.addEventListener("click", () => {
      score = 0;
      errors = 0;
      totalTargets = 0;
      foundTargets = 0;

      render();

      topMessageEl.textContent = "Задание обновлено.";
      topMessageEl.classList.add("show");
      topMessageEl.classList.add("ok");
    });

    function splitToken(token){
      const match = token.match(/^(.+?)([.,!?;:…—-]*)$/);
      if (!match) return { word: token, punct: "" };
      return {
        word: match[1] || "",
        punct: match[2] || ""
      };
    }

    function pushWordsFromChunk(arr, text, type){
      const clean = text.replace(/\s+/g, " ").trim();
      if (!clean) return;

      const rawTokens = clean.split(" ");
      rawTokens.forEach(token => {
        const parts = splitToken(token);
        if (parts.word) arr.push({ text: parts.word, type });
        if (parts.punct) arr.push({ text: parts.punct, type: null, punct: true });
      });
    }

    function parseMarkedSentence(str){
      const result = [];
      let i = 0;

      while (i < str.length) {
        if (str.startsWith("{{", i)) {
          const end = str.indexOf("}}", i);
          if (end === -1) {
            pushWordsFromChunk(result, str.slice(i), null);
            break;
          }
          pushWordsFromChunk(result, str.slice(i + 2, end), "pris");
          i = end + 2;
        } else if (str.startsWith("<<", i)) {
          const end = str.indexOf(">>", i);
          if (end === -1) {
            pushWordsFromChunk(result, str.slice(i), null);
            break;
          }
          pushWordsFromChunk(result, str.slice(i + 2, end), "poyasn");
          i = end + 2;
        } else if (str.startsWith("||", i)) {
          const end = str.indexOf("||", i + 2);
          if (end === -1) {
            pushWordsFromChunk(result, str.slice(i), null);
            break;
          }
          pushWordsFromChunk(result, str.slice(i + 2, end), "utoch");
          i = end + 2;
        } else {
          let next = str.length;
          const nextU = str.indexOf("||", i);
          const nextP = str.indexOf("<<", i);
          const nextPr = str.indexOf("{{", i);
          if (nextU !== -1) next = Math.min(next, nextU);
          if (nextP !== -1) next = Math.min(next, nextP);
          if (nextPr !== -1) next = Math.min(next, nextPr);
          pushWordsFromChunk(result, str.slice(i, next), null);
          i = next;
        }
      }

      return result;
    }

    function updateStats(){
      scoreEl.textContent = score;
      errorsEl.textContent = errors;
    }

    function createWord(item){
      const span = document.createElement("span");
      span.textContent = item.text;
      span.className = "word";

      if (item.punct) {
        span.style.cursor = "default";
        span.style.paddingLeft = "2px";
        span.style.paddingRight = "2px";
        span.style.marginLeft = "0";
        span.style.marginRight = "0";
        return span;
      }

      if (item.type) {
        span.dataset.type = item.type;
        totalTargets++;
      }

      span.addEventListener("click", () => {
        if (span.classList.contains("done")) return;

        const trueType = span.dataset.type || "";

        if (trueType === mode) {
          score++;
          foundTargets++;
          span.classList.add("done");

          if (mode === "utoch") span.classList.add("correct-blue");
          if (mode === "poyasn") span.classList.add("correct-green");
          if (mode === "pris") span.classList.add("correct-yellow");
        } else {
          errors++;
          span.classList.add("done", "wrong");
        }

        updateStats();
      });

      return span;
    }

    function render(){
      quizEl.innerHTML = "";
      totalTargets = 0;
      foundTargets = 0;
      topMessageEl.classList.remove("show", "ok");
      topMessageEl.textContent = "";
      finalEl.style.display = "none";
      finalEl.textContent = "";

      const shuffled = shuffleArray(data);

      shuffled.forEach(sentence => {
        const box = document.createElement("div");
        box.className = "sentence";

        const items = parseMarkedSentence(sentence);

        items.forEach((item, index) => {
          const el = createWord(item);
          box.appendChild(el);

          const next = items[index + 1];
          if (!next) return;

          const currentIsPunct = !!item.punct;
          const nextIsPunct = !!next.punct;

          if (!currentIsPunct && !nextIsPunct) {
            box.appendChild(document.createTextNode(" "));
          }
        });

        quizEl.appendChild(box);
      });

      updateStats();
    }

    render();
  </script>
</body>
</html>
